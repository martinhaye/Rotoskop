# XcodeGen project definition for the Rotoskop iOS app.
#
# The app is intentionally NOT part of Package.swift so the core package stays
# Linux-buildable. Generate the Xcode project with:
#
#     brew install xcodegen        # one-time
#     cd App && xcodegen generate  # produces Rotoskop.xcodeproj (git-ignored)
#     open Rotoskop.xcodeproj
#
# The app consumes the core libraries via a local Swift Package path dependency.

name: Rotoskop
options:
  bundleIdPrefix: com.rotoskop
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true

packages:
  Rotoskop:
    path: ..

targets:
  Rotoskop:
    type: application
    platform: iOS
    sources:
      - path: Rotoskop
    dependencies:
      - package: Rotoskop
        product: RotoskopEmulator
      - package: Rotoskop
        product: RotoskopWorkspace
      - package: Rotoskop
        product: RotoskopGit
      - package: Rotoskop
        product: RotoskopEditorCore
    settings:
      base:
        INFOPLIST_KEY_UILaunchScreen_Generation: true
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        PRODUCT_BUNDLE_IDENTIFIER: com.rotoskop.app
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        TARGETED_DEVICE_FAMILY: "1,2"
