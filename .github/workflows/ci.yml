name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  linux-build-test:
    name: Build & test (Linux)
    runs-on: ubuntu-latest
    container: swift:6.1
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Build
        run: swift build
      - name: Test
        run: swift test
